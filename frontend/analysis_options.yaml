# Static analysis configuration for the Parlo frontend.
#
# The architecture plan (Phase 0.4) asks for strict casts, strict inference,
# and no literal bool comparisons, on top of the recommended Flutter lint set.

include: package:flutter_lints/flutter.yaml

analyzer:
  # Strong-mode rules. These catch common dynamic-dispatch bugs at analysis
  # time instead of at runtime.
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat these as errors (not warnings) so they fail the build in CI.
    no_literal_bool_comparisons: error
    avoid_returning_null_for_future: error
    unawaited_futures: error
  exclude:
    # Generated files are not worth linting and frequently trip false positives.
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/generated/**"

linter:
  rules:
    # Encourage clear, maintainable Dart. Keep the set reasonable so the lint
    # output stays useful instead of noisy.
    prefer_single_quotes: true
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true
    prefer_final_in_for_each: true
    prefer_typing_uninitialized_variables: true
    avoid_print: true
    avoid_unnecessary_containers: true
    unnecessary_const: true
    unnecessary_new: true
    unnecessary_null_in_if_null_operators: true
    use_key_in_widget_constructors: true
    use_super_parameters: true
    sort_child_properties_last: true
    # NOTE: public_member_api_docs is intentionally NOT enabled here. It would
    # flag every public widget and helper, which is noisier than it is useful.
    # The project's own rule (document key types and functions in simple
    # English) is enforced by code review instead.
